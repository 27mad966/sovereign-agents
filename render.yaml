services:
  - type: web
    name: sovereign-agents
    env: python
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: BINANCE_API_KEY
        sync: false
      - key: BINANCE_SECRET
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: ANALYSIS_TIMEFRAME
        value: 15m
      - key: HTF_TIMEFRAME
        value: 1h
      - key: SYMBOLS
        value: BTCUSDT,ETHUSDT,SOLUSDT
